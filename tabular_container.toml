# Use the local SquashFS image you specified
image = "jfrog.svc.cscs.ch/docker-group-csstaff/alps-images/ngc-nemo:25.11.01-alps3"

workdir = "${SCRATCH}"

mounts = [
  "/capstor",
  "/iopsstor",
  "${SCRATCH}:${SCRATCH}",
  "${HOME}:${HOME}",
  "/tmp:/tmp",                               # FIX: PMIx writes sockets here at job start
  "/var/spool/slurmd:/var/spool/slurmd",     # FIX: PMIx daemon socket lives here
]

writable = true

[env]
PMIX_MCA_psec = "native"

[annotations]
com.hooks.cxi.enabled = "true"              # FIX: was "false", needs to be true
com.hooks.netstack.source = "artifact"
