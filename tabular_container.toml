# Use the local SquashFS image you specified
image = "jfrog.svc.cscs.ch/docker-group-csstaff/alps-images/ngc-nemo:25.11.01-alps3"

# Start inside your scratch by default (optional)
workdir = "${SCRATCH}"

# Typical mounts (feel free to trim)
mounts = [
  "/capstor",
  "/iopsstor",
  "${SCRATCH}:${SCRATCH}",
  "${HOME}:${HOME}",
]

writable = true

[env]
PMIX_MCA_psec="native"

[annotations]
com.hooks.cxi.enabled="false"
com.hooks.netstack.source = "artifact"
